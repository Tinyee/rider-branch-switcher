name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Ensure gradlew is executable (non-Windows)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew test

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Static analysis (detekt)
        run: ./gradlew detekt

      - name: Quick structural checks
        run: ./gradlew quickCheck

      - name: Verify structural checks catch violations
        run: ./gradlew checkQuickCheck

      - name: Verify plugin compatibility
        if: runner.os == 'Linux'
        run: ./gradlew verifyPlugin

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: build/reports/tests/

      - name: Upload plugin artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.os }}
          path: build/distributions/*.zip
